name: tapir_test
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  equatable: ^2.0.7
  get_it: ^8.2.0
  injectable: ^2.5.1
  shared_preferences: ^2.5.3
  auto_route: ^10.2.0
  image_picker: ^1.2.0
  image_cropper: ^11.0.0
  intl: ^0.20.2
  share_plus: ^12.0.0
  flutter_svg: 2.2.4
  flutter_gen: ^5.13.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.5.1
  injectable_generator: ^2.6.2
  auto_route_generator: ^10.2.0
  json_serializable: ^6.9.4
  flutter_gen_runner: ^5.13.0+1
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

flutter:

